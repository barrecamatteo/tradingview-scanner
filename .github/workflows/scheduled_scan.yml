name: 3x Week Scan (4H/1H/15min)

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      timeframes:
        description: 'Timeframes to scan (space-separated)'
        required: false
        default: '4H 1H 15min'

  # Scheduled: Mon-Wed-Fri at 03:30 UTC (04:30 Rome)
  schedule:
    - cron: '30 3 * * 1,3,5'

env:
  TV_USERNAME: ${{ secrets.TV_USERNAME }}
  TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  TV_COOKIES: ${{ secrets.TV_COOKIES }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore cookies
        run: |
          mkdir -p data
          echo "$TV_COOKIES" | base64 -d > data/tv_cookies.json
          echo "Cookies restored to data/tv_cookies.json"

      - name: Run weekly scan (4H/1H/15min)
        run: |
          python run_scan.py --timeframes ${{ github.event.inputs.timeframes || '4H 1H 15min' }} --method csv

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-scan-screenshots
          path: data/screenshots/
          retention-days: 7
